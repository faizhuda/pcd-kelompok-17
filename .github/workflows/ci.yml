name: CI

on:
  push:
    branches: ["main", "**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint (ruff)
        run: ruff check src/

      - name: Tests
        run: pytest tests/ -v --ignore=tests/test_evaluate.py -x
        # test_evaluate.py is excluded because it optionally imports TensorFlow,
        # which is not installed in the CI environment (requirements-cnn.txt).
        # The TF-dependent test already uses pytest.importorskip to self-skip.
